name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-intellij-jar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build IntelliJ plugin JAR
        run: |
          cd intellij/resources
          jar cf ../../low-gravitas.jar META-INF/ lowgravitas.theme.json low_gravitas.xml lowgravitaslight.theme.json low_gravitas_light.xml
          cd ../..
          echo "Built low-gravitas.jar"
          jar tf low-gravitas.jar

      - name: Generate release artifacts
        run: python3 generate.py --artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            low-gravitas.jar
            dist/low-gravitas.css
            dist/palette.json
            dist/code-samples.html
            ghostty/LowGravitas
            ghostty/LowGravitasLight
            warp/low_gravitas_theme.yaml
            warp/low_gravitas_light_theme.yaml
            iTerm2/LowGravitas.itermcolors
            iTerm2/LowGravitasLight.itermcolors
          generate_release_notes: true
